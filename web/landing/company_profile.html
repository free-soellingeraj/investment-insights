                    <div class="${iconColor} mb-1 group-hover:text-brand-400 transition-colors">${icon}</div>
                    <div class="text-xs font-medium ${textColor} leading-tight">${st.label}</div>
                    ${countLabel ? `<div class="text-xs font-mono ${done && !checkedEmpty ? 'text-green-500' : 'text-gray-600'} mt-0.5">${countLabel}</div>` : ''}
                    ${statusLabel}
                    ${dateLabel ? `<div class="text-xs text-gray-600 mt-0.5">${dateLabel}</div>` : ''}
                    ${detailHtml}
                    <div class="text-xs text-gray-700 group-hover:text-brand-400 mt-1 transition-colors">&#9654; Run</div>
                </div>`;
            }

            ph += `</div></div>`;
            container.innerHTML = ph;

            // Disable buttons for stages that are already running
            _applyRunningStageOverlay();

            // Populate rescore indicator if there are unscored evidence groups
            const rescoreEl = document.getElementById('rescore-indicator');
            if (rescoreEl) {
                const unscoredCount = stages.score?.unscored_evidence || 0;
                if (unscoredCount > 0) {
                    rescoreEl.innerHTML = `<div class="bg-amber-900/20 border border-amber-700/50 rounded-xl p-4 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                            <span class="text-sm text-amber-300">${unscoredCount} evidence group${unscoredCount === 1 ? '' : 's'} not yet scored</span>
                        </div>
                        <button onclick="showRunMenu(this, (force) => runStage('score', force))" class="px-4 py-1.5 bg-amber-600 hover:bg-amber-500 text-white text-sm font-medium rounded-lg transition-colors">Re-score Now</button>
                    </div>`;
                } else {
                    rescoreEl.innerHTML = '';
                }
            }
        } catch (e) {
            console.error('Failed to load pipeline status:', e);
            container.innerHTML = '';
        }
    }

    function toggleEvidenceFilter(btn) {
        const key = btn.dataset.filterKey;
        const value = btn.dataset.filterValue;
        // Toggle this button
        const wasActive = btn.classList.contains('ev-filter-active');

        // Deactivate all buttons in same row (single-select per filter key)
        btn.parentElement.querySelectorAll(`.ev-filter-btn[data-filter-key="${key}"]`).forEach(b => {
            b.classList.remove('ev-filter-active', 'border-brand-600', 'text-brand-400');
            b.classList.add('border-gray-700', 'text-gray-500');
        });

        if (!wasActive) {
            btn.classList.add('ev-filter-active', 'border-brand-600', 'text-brand-400');
            btn.classList.remove('border-gray-700', 'text-gray-500');
            window._evidenceFilters[key] = value;
        } else {
            window._evidenceFilters[key] = null;
        }
        applyEvidenceFilters();
    }

    function applyEvidenceFilters() {
        const filters = window._evidenceFilters;
        const sortVal = document.getElementById('ev-sort-select')?.value || 'date_newest';
        const cards = document.querySelectorAll('.ev-group-card');
        let visible = 0;

        // Collect cards and their sort keys
        const cardData = [];
        cards.forEach(card => {
            const dim = card.dataset.dim;
            const sources = card.dataset.sources.split(',').filter(Boolean);
            const evType = card.dataset.evtype;

            const captureStage = card.dataset.capturestage;

            let show = true;
            if (filters.source && !sources.includes(filters.source)) show = false;
            if (filters.dimension && dim !== filters.dimension) show = false;
            if (filters.evType && evType !== filters.evType) show = false;
            if (filters.captureStage && captureStage !== filters.captureStage) show = false;

            card.style.display = show ? '' : 'none';
            if (show) visible++;

            let sortKey = 0;
            if (sortVal === 'dollar_high') sortKey = parseFloat(card.dataset.dollar) || 0;
            else if (sortVal === 'date_newest') sortKey = card.dataset.date || '';
            else if (sortVal === 'date_oldest') sortKey = card.dataset.date || '';
            else if (sortVal === 'confidence') sortKey = parseFloat(card.dataset.conf) || 0;

            cardData.push({ card, sortKey, show });
        });

        // Sort visible cards
        const parent = document.getElementById('ev-groups-list');
        if (parent) {
            const desc = sortVal !== 'date_oldest';
            cardData.sort((a, b) => {
                if (typeof a.sortKey === 'string') {
                    return desc ? b.sortKey.localeCompare(a.sortKey) : a.sortKey.localeCompare(b.sortKey);
                }
                return desc ? b.sortKey - a.sortKey : a.sortKey - b.sortKey;
            });
            for (const { card } of cardData) {
                parent.appendChild(card);
            }
        }

        // Update count label
        const label = document.getElementById('ev-count-label');
        if (label) label.textContent = `${visible} of ${cards.length} groups`;
    }

    const _queuedStages = new Set();

    async function _applyRunningStageOverlay() {
        const stageOrder = await _pipelineStagesPromise;
        const cells = document.querySelectorAll('#pipeline-status-section .pipeline-tip');
        cells.forEach((cell, idx) => {
            const key = stageOrder[idx];
            if (!key) return;
            const isRunning = _runningStages.has(key);
            const isQueued = _queuedStages.has(key);
            const runBtn = cell.querySelector('div:last-child');
            if (isRunning || isQueued) {
                cell.style.pointerEvents = 'none';
                cell.style.opacity = '0.6';
                if (runBtn) {
                    if (isRunning) {
                        runBtn.innerHTML = '<span class="loader" style="width:12px;height:12px;border-width:2px"></span> Running';
                        runBtn.classList.add('text-blue-400');
                        runBtn.classList.remove('text-yellow-400');
                    } else {
                        runBtn.innerHTML = '&#9202; Enqueued';
                        runBtn.classList.add('text-yellow-400');
                        runBtn.classList.remove('text-blue-400');
                    }
                }
            } else {
                cell.style.pointerEvents = '';
                cell.style.opacity = '';
                if (runBtn) {
                    runBtn.innerHTML = '&#9654; Run';
                    runBtn.classList.remove('text-blue-400', 'text-yellow-400');
                }
            }
        });
    }

    function showRunMenu(anchorEl, onSelect) {
        // Remove any existing menu
        document.getElementById('run-mode-menu')?.remove();

        const menu = document.createElement('div');
        menu.id = 'run-mode-menu';
        menu.className = 'absolute z-50 bg-gray-800 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[200px]';
        menu.innerHTML = `
            <button class="w-full text-left px-4 py-2 text-sm text-gray-200 hover:bg-brand-600/20 hover:text-brand-300 flex items-center gap-2" data-force="false">
                <span>▶</span> Run Incremental
                <span class="ml-auto text-xs text-gray-500">new data only</span>
            </button>
            <button class="w-full text-left px-4 py-2 text-sm text-gray-200 hover:bg-brand-600/20 hover:text-brand-300 flex items-center gap-2" data-force="true">
                <span>⟳</span> Run From Scratch
                <span class="ml-auto text-xs text-gray-500">all dates</span>
            </button>
        `;

        // Position below anchor
        const rect = anchorEl.getBoundingClientRect();
        menu.style.position = 'fixed';
        menu.style.top = rect.bottom + 4 + 'px';
        menu.style.left = rect.left + 'px';

        // Handle selection
        menu.querySelectorAll('button').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const force = btn.dataset.force === 'true';
                menu.remove();
                onSelect(force);
            };
        });

        document.body.appendChild(menu);

        // Dismiss on outside click or Escape
        const dismiss = (e) => {
            if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', dismiss); }
        };
        setTimeout(() => document.addEventListener('click', dismiss), 0);
        document.addEventListener('keydown', function esc(e) {
            if (e.key === 'Escape') { menu.remove(); document.removeEventListener('keydown', esc); }
        });
    }

    async function runStage(stage, force = false) {
        // Prevent running if already running or queued
        if (_queuedStages.has(stage) || _runningStages.has(stage)) return;

        // Visual feedback: find the clicked cell and show spinner
        const cells = document.querySelectorAll('#pipeline-status-section .pipeline-tip');
        const stageOrder = await _pipelineStagesPromise;
        const idx = stageOrder.indexOf(stage);
        const cell = cells[idx];
        if (cell) {
            const runBtn = cell.querySelector('div:last-child');
            if (runBtn) runBtn.innerHTML = '<span class="loader" style="width:12px;height:12px;border-width:2px"></span>';
        }

        try {
            const resp = await fetch(`/api/companies/${TICKER}/run-stage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stage, force }),
            });
            const data = await resp.json();
            if (data.error) {
                alert('Error: ' + data.error);
                if (cell) {
                    const runBtn = cell.querySelector('div:last-child');
                    if (runBtn) runBtn.innerHTML = '&#9654; Run';
                }
                return;
            }
            // Mark as running or enqueued to prevent re-runs
            if (data.status === 'enqueued') {
                _queuedStages.add(stage);
            } else {
                _runningStages.add(stage);
            }
            // Show confirmation
            if (cell) {
                const runBtn = cell.querySelector('div:last-child');
                if (runBtn) {
                    if (data.status === 'enqueued') {
                        runBtn.innerHTML = '&#9202; Enqueued';
                        runBtn.classList.add('text-yellow-400');
                    } else {
                        runBtn.innerHTML = '<span class="loader" style="width:12px;height:12px;border-width:2px"></span> Running';
                        runBtn.classList.add('text-blue-400');
                    }
                }
                cell.style.pointerEvents = 'none';
                cell.style.opacity = '0.6';
            }
            // Hide rescore banner when score stage is queued
            if (stage === 'score') {
                const rescoreEl = document.getElementById('rescore-indicator');
                if (rescoreEl) rescoreEl.innerHTML = '';
            }
            // Ensure the completion transition triggers a pipeline status refresh
            _prevAnyRunning = true;
            // Refresh runs list and start polling
            loadCompanyRuns(TICKER);
        } catch (e) {
            console.error('Failed to trigger stage:', e);
            alert('Failed to trigger stage: ' + e.message);
            if (cell) {
                const runBtn = cell.querySelector('div:last-child');
                if (runBtn) runBtn.innerHTML = '&#9654; Run';
            }
        }
    }

    async function runWholePipeline(force = false) {
        const btn = document.getElementById('run-whole-pipeline-btn');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loader" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle"></span> Starting...';
        }

        try {
            const resp = await fetch(`/api/companies/${TICKER}/run-pipeline`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ force }),
            });
            const data = await resp.json();
            if (data.error) {
                alert('Error: ' + data.error);
                if (btn) { btn.disabled = false; btn.innerHTML = 'Run Whole Pipeline'; }
                return;
            }

            // Mark all stages as running/enqueued in the UI
            const pipelineOrder = await _pipelineStagesPromise;
            const targetSet = data.status === 'enqueued' ? _queuedStages : _runningStages;
            for (const stage of pipelineOrder) {
                targetSet.add(stage);
            }
            _applyRunningStageOverlay();

            if (btn) {
                btn.innerHTML = data.status === 'enqueued' ? 'Pipeline Enqueued' : 'Pipeline Running';
                btn.classList.remove('bg-brand-600', 'hover:bg-brand-700');
                btn.classList.add('bg-gray-700', 'text-gray-400');
            }
        } catch (e) {
            console.error('Failed to trigger whole pipeline:', e);
            alert('Failed to trigger pipeline: ' + e.message);
            if (btn) { btn.disabled = false; btn.innerHTML = 'Run Whole Pipeline'; }
        }

        // Ensure the completion transition triggers a pipeline status refresh
        _prevAnyRunning = true;
        loadCompanyRuns(TICKER);
    }

    async function runSubPipeline(subTicker, btnEl, force = false) {
        if (btnEl) { btnEl.disabled = true; btnEl.innerHTML = '<span class="loader" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle"></span>'; }
        try {
            const resp = await fetch(`/api/companies/${subTicker}/run-pipeline`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ force }),
            });
            const data = await resp.json();
            if (data.error) {
                alert(`Error for ${subTicker}: ${data.error}`);
                if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '&#9654; Run'; }
                return;
            }
            if (btnEl) {
                btnEl.innerHTML = data.status === 'enqueued' ? 'Enqueued' : 'Running';
                btnEl.classList.add('text-brand-400', 'border-brand-700');
            }
        } catch (e) {
            alert(`Failed for ${subTicker}: ${e.message}`);
            if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '&#9654; Run'; }
        }
    }

    async function runAllSubsidiaryPipelines(force = false) {
        const subs = window._subsidiaries || [];
        if (subs.length === 0) return;

        const btn = document.getElementById('run-all-subs-btn');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loader" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle"></span> Starting...';
        }

        let started = 0, failed = 0;
        for (const sub of subs) {
            const subTicker = sub.ticker || sub.slug;
            try {
                const resp = await fetch(`/api/companies/${subTicker}/run-pipeline`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ force }),
                });
                const data = await resp.json();
                if (data.error) { failed++; } else { started++; }
            } catch (e) {
                failed++;
            }
        }

        if (btn) {
            const msg = failed > 0 ? `${started} started, ${failed} failed` : `${started} pipelines started`;
            btn.innerHTML = msg;
            btn.classList.remove('bg-brand-600', 'hover:bg-brand-700');
            btn.classList.add('bg-gray-700', 'text-gray-400');
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = 'Run All Pipelines';
                btn.classList.remove('bg-gray-700', 'text-gray-400');
                btn.classList.add('bg-brand-600', 'hover:bg-brand-700');
            }, 10000);
        }
    }

    let _runsPollingTimer = null;
    let _runsPage = 1;
    let _allLoadedRuns = [];
    let _runsHasMore = false;
    let _runningStages = new Set();  // stages with an active running pipeline
    let _prevAnyRunning = false;

    const _statusBadge = (status) => {
        const map = {
            running: 'bg-blue-900/40 text-blue-400 border-blue-800',
            enqueued: 'bg-yellow-900/40 text-yellow-400 border-yellow-800',
            completed: 'bg-green-900/40 text-green-400 border-green-800',
            failed: 'bg-red-900/40 text-red-400 border-red-800',
            cancelled: 'bg-orange-900/40 text-orange-400 border-orange-800',
        };
        return map[status] || 'bg-gray-800 text-gray-400 border-gray-700';
    };

    const _statusIcon = (status) => {
        if (status === 'running') return '<span class="loader" style="width:10px;height:10px;border-width:2px"></span>';
        if (status === 'enqueued') return '<span class="text-yellow-400">&#9202;</span>';
        if (status === 'completed') return '<span class="text-green-400">&#10003;</span>';
        if (status === 'failed') return '<span class="text-red-400">&#10007;</span>';
        if (status === 'cancelled') return '<span class="text-orange-400">&#8856;</span>';
        return '';
    };

    const _fmtDuration = (sec) => {
        if (sec == null) return '—';
        if (sec < 60) return sec.toFixed(1) + 's';
        if (sec < 3600) return Math.floor(sec / 60) + 'm ' + Math.round(sec % 60) + 's';
        return Math.floor(sec / 3600) + 'h ' + Math.round((sec % 3600) / 60) + 'm';
    };

    const _fmtTime = (iso) => {
        if (!iso) return '—';
        const d = new Date(iso);
        const now = new Date();
        const diffMs = now - d;
        if (diffMs < 60000) return 'just now';
        if (diffMs < 3600000) return Math.floor(diffMs / 60000) + 'm ago';
        if (diffMs < 86400000) return Math.floor(diffMs / 3600000) + 'h ago';
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    };

    const _runTypeBadge = (rt) => {
        if (rt === 'web_trigger') return '<span class="text-xs px-1.5 py-0.5 rounded bg-brand-900/30 text-brand-400 border border-brand-800">manual</span>';
        if (rt === 'full') return '<span class="text-xs px-1.5 py-0.5 rounded bg-gray-800 text-gray-500 border border-gray-700">full</span>';
        if (rt === 'partial') return '<span class="text-xs px-1.5 py-0.5 rounded bg-yellow-900/30 text-yellow-500 border border-yellow-800">partial</span>';
        return '<span class="text-xs px-1.5 py-0.5 rounded bg-gray-800 text-gray-500 border border-gray-700">' + (rt || '—') + '</span>';
    };

    function _renderRunCounts(run) {
        const parts = [];
        if (run.evidence_count > 0) parts.push(run.evidence_count + ' evidence');
        if (run.groups_count > 0) parts.push(run.groups_count + ' groups');
        if (run.valuations_count > 0) parts.push(run.valuations_count + ' valuations');
        if (run.scores_count > 0) parts.push(run.scores_count + ' scores');

        if (parts.length > 0) {
            return `<div class="mt-1 pl-8 text-xs text-gray-500">${parts.join(' · ')}</div>`;
        }
        if (run.status === 'completed' || run.status === 'failed') {
            return '<div class="mt-1 pl-8 text-xs text-gray-600">no new data</div>';
        }
        return '';
    }

    function _renderRunRow(run) {
        const subtask = run.subtask || run.task || '—';
        const succeeded = run.tickers_succeeded || 0;
        const failed = run.tickers_failed || 0;
        const duration = run.duration_sec != null
            ? _fmtDuration(run.duration_sec)
            : (run.status === 'running' && run.started_at
                ? _fmtDuration((Date.now() - new Date(run.started_at)) / 1000) + '...'
                : '—');

        return `<div class="bg-gray-800/30 rounded-lg px-4 py-3 border border-gray-800">
            <div class="flex items-center gap-3 flex-wrap">
                <div class="flex-shrink-0 w-5">${_statusIcon(run.status)}</div>
                <span class="text-xs px-2 py-0.5 rounded border ${_statusBadge(run.status)}">${run.status}</span>
                ${_runTypeBadge(run.run_type)}
                <span class="text-sm text-gray-200 font-medium">${subtask}</span>
                <span class="ml-auto text-xs text-gray-600 font-mono">${run.run_id?.slice(0, 12) || ''}</span>
                ${(run.status === 'running' || run.status === 'enqueued') ? `<button onclick="cancelRun('${run.run_id}')" class="text-xs text-red-400 hover:text-red-300 ml-2 px-2 py-0.5 rounded border border-red-900 hover:border-red-700 transition-colors">Cancel</button>` : ''}
            </div>
            <div class="flex items-center gap-4 mt-1.5 text-xs text-gray-500 pl-8">
                <span title="${run.started_at || ''}">Started ${_fmtTime(run.started_at)}</span>
                <span>Duration: <span class="text-gray-400">${duration}</span></span>
                ${succeeded > 0 ? `<span class="text-green-600">${succeeded} succeeded</span>` : ''}
                ${failed > 0 ? `<span class="text-red-500">${failed} failed</span>` : ''}
            </div>
            ${run.error_message ? `<div class="mt-1.5 pl-8 text-xs text-red-400/80 truncate" title="${run.error_message.replace(/"/g, '&quot;')}">${run.error_message}</div>` : ''}
            ${_renderRunCounts(run)}
        </div>`;
    }

    function _renderRunsList() {
        const container = document.getElementById('pipeline-runs-section');
        if (!container) return;

        if (_allLoadedRuns.length === 0) {
            container.innerHTML = '';
            return;
        }

        const anyRunning = _allLoadedRuns.some(r => r.status === 'running' || r.status === 'enqueued');

        let rh = `<details class="bg-gray-900 border border-gray-800 rounded-xl">
            <summary class="p-6 cursor-pointer select-none flex items-center gap-2 hover:bg-gray-800/30 transition-colors">
                <svg class="w-3 h-3 text-gray-500 transition-transform details-arrow" fill="currentColor" viewBox="0 0 20 20"><path d="M6 4l8 6-8 6V4z"/></svg>
                <span class="font-semibold text-gray-300">Recent Pipeline Runs</span>
                ${anyRunning ? '<span class="loader ml-2" style="width:12px;height:12px;border-width:2px"></span>' : ''}
            </summary>
            <div class="px-6 pb-6 space-y-2">`;

        for (const run of _allLoadedRuns) {
            rh += _renderRunRow(run);
        }

        if (_runsHasMore) {
            rh += `<button onclick="loadMoreRuns()" id="load-more-runs-btn" class="w-full py-2 text-xs text-gray-500 hover:text-gray-300 border border-gray-800 rounded-lg hover:border-gray-700 transition-colors">Load older runs</button>`;
        }

        rh += `</div></details>`;

        // Preserve open state across re-renders
        const wasOpen = container.querySelector('details')?.open || false;
        container.innerHTML = rh;
        if (wasOpen) container.querySelector('details').open = true;

        // Build set of stages that are currently running or enqueued
        _runningStages = new Set();
        _queuedStages.clear();
        for (const run of _allLoadedRuns) {
            if ((run.status === 'running' || run.status === 'enqueued') && run.subtask) {
                const targetSet = run.status === 'running' ? _runningStages : _queuedStages;
                // subtask may be "value_evidence" or "collect_news+extract_news+value_evidence"
                for (const s of run.subtask.split('+')) {
                    targetSet.add(s.trim());
                }
            }
        }
        _applyRunningStageOverlay();

        // Poll if any runs are still running
        if (_runsPollingTimer) clearInterval(_runsPollingTimer);
        if (anyRunning) {
            _runsPollingTimer = setInterval(() => loadCompanyRuns(TICKER), 5000);
        } else if (_prevAnyRunning) {
            // Runs just finished — refresh pipeline status and page data
            loadPipelineStatus(TICKER);
            loadValuations(TICKER);
        }
        _prevAnyRunning = anyRunning;
    }

    async function cancelRun(runId) {
        try {
            const resp = await fetch(`/api/companies/${TICKER}/cancel-run`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ run_id: runId }),
            });
            const data = await resp.json();
            if (data.error) { alert('Error: ' + data.error); return; }
            // Update locally to avoid page jump and preserve loaded pages
            const run = _allLoadedRuns.find(r => r.run_id === runId);
            if (run) {
                run.status = 'cancelled';
                run.error_message = 'Cancelled by user';
                run.completed_at = new Date().toISOString();
                if (run.started_at) {
                    run.duration_sec = Math.round((Date.now() - new Date(run.started_at)) / 1000 * 10) / 10;
                }
            }
            _renderRunsList();
        } catch (e) {
            console.error('Failed to cancel run:', e);
            alert('Failed to cancel run: ' + e.message);
        }
    }

    async function loadCompanyRuns(ticker, page) {
        const container = document.getElementById('pipeline-runs-section');
        if (!container) return;

        if (page === undefined) {
            // Fresh load — reset
            page = 1;
            _runsPage = 1;
            _allLoadedRuns = [];
        }

        try {
            const resp = await fetch(`/api/companies/${ticker}/runs?page=${page}&per_page=5`);
            const data = await resp.json();
            const runs = data.runs || [];
            _runsHasMore = data.has_more || false;

            if (page === 1) {
                _allLoadedRuns = runs;
            } else {
                _allLoadedRuns = _allLoadedRuns.concat(runs);
            }
            _runsPage = page;

            _renderRunsList();

        } catch (e) {
            console.error('Failed to load company runs:', e);
            container.innerHTML = '';
        }
    }

    async function loadMoreRuns() {
        const btn = document.getElementById('load-more-runs-btn');
        if (btn) btn.textContent = 'Loading...';
        await loadCompanyRuns(TICKER, _runsPage + 1);
    }

    async function updateSubsidiaryRecords() {
        try {
            const resp = await fetch(`/api/companies/${TICKER}/run-stage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stage: 'discover_links' }),
            });
            const result = await resp.json();
            if (result.error) {
                alert('Error: ' + result.error);
            } else {
                alert('Pipeline started. The page will refresh when data is available.');
                setTimeout(() => location.reload(), 3000);
            }
        } catch (e) {
            alert('Failed to start pipeline: ' + e.message);
        }
    }

    load();
    </script>
</body>
</html>
