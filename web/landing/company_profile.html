<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TICKER}} — AI Opportunity Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' },
            }}}
        }
    </script>
    <style>
        .loader { border: 3px solid #374151; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .score-bar { height: 8px; border-radius: 4px; background: #1f2937; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
        .pipeline-tip { position: relative; }
        .pipeline-tip .tip-text {
            visibility: hidden; opacity: 0;
            position: absolute; bottom: calc(100% + 8px); left: 50%;
            transform: translateX(-50%); width: 220px;
            background: #1f2937; border: 1px solid #374151; border-radius: 8px;
            padding: 8px 10px; font-size: 11px; line-height: 1.4;
            color: #d1d5db; text-align: left; z-index: 50;
            pointer-events: none; transition: opacity 0.15s;
            box-shadow: 0 4px 12px rgba(0,0,0,.4);
        }
        details summary::-webkit-details-marker { display: none; }
        details summary::marker { display: none; content: ''; }
        details[open] .details-arrow { transform: rotate(90deg); }
        #evidence-scroll-area::-webkit-scrollbar { width: 6px; }
        #evidence-scroll-area::-webkit-scrollbar-track { background: transparent; }
        #evidence-scroll-area::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        #evidence-scroll-area::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .pipeline-tip .tip-text::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent; border-top-color: #374151;
        }
        .pipeline-tip:hover .tip-text { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 antialiased">
    <script>
        const AUTH_TOKEN = "{{TOKEN}}";
        const TICKER = "{{TICKER}}";
        // Fetch canonical stage order from pipeline DAG (cached as a promise)
        const _pipelineStagesPromise = fetch('/api/pipeline/stages')
            .then(r => r.json())
            .then(d => d.stages || [])
            .catch(() => [
                'discover_links', 'collect_news', 'collect_github', 'collect_analysts',
                'collect_web_enrichment', 'extract_filings', 'extract_news', 'extract_unified',
                'value_evidence', 'score',
            ]);
    </script>

    <!-- Nav -->
    <nav class="fixed top-0 w-full z-50 bg-gray-950/80 backdrop-blur border-b border-gray-800">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/dashboard?token={{TOKEN}}" class="text-gray-400 hover:text-white text-sm">&larr; Dashboard</a>
                <span class="text-gray-700">|</span>
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center font-bold text-sm">AI</div>
                <span class="text-lg font-semibold" id="nav-title">{{TICKER}}</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="/status" class="text-gray-400 hover:text-white text-sm">Pipeline Status</a>
                <a href="/trading" class="text-gray-400 hover:text-white text-sm">Trading</a>
                <a href="/changelog" class="text-gray-400 hover:text-white text-sm">Changelog</a>
                <a href="/internals" class="text-gray-400 hover:text-white text-sm">Internals</a>
            </div>
        </div>
    </nav>

    <div class="pt-24 max-w-5xl mx-auto px-6 pb-20">
        <div id="loading" class="text-center py-20"><div class="loader mx-auto"></div><p class="mt-3 text-gray-500">Loading company profile...</p></div>
        <div id="content" class="hidden"></div>
    </div>

    <script>
    const fmtScore = v => v != null ? v.toFixed(3) : '—';
    const fmtRoi = v => v != null ? v.toFixed(2) + 'x' : '—';
    const fmtMoney = (v, units) => {
        if (v == null) return '—';
        if (units === 'count') return Math.round(v).toLocaleString();
        if (v >= 1e12) return '$' + (v / 1e12).toFixed(2) + 'T';
        if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
        if (v >= 1e6) return '$' + (v / 1e6).toFixed(0) + 'M';
        return '$' + v.toLocaleString();
    };

    function scoreColor(v) {
        if (v == null) return '#4b5563';
        if (v >= 0.7) return '#22c55e';
        if (v >= 0.4) return '#eab308';
        if (v >= 0.2) return '#f97316';
        return '#ef4444';
    }

    function scoreBar(label, value, color) {
        const pct = value != null ? Math.min(value * 100, 100) : 0;
        return `
            <div class="flex items-center gap-3 py-1.5">
                <span class="text-xs text-gray-400 w-32 flex-shrink-0">${label}</span>
                <div class="score-bar flex-1"><div class="score-bar-fill" style="width:${pct}%;background:${color || scoreColor(value)}"></div></div>
                <span class="font-mono text-xs w-14 text-right" style="color:${color || scoreColor(value)}">${fmtScore(value)}</span>
            </div>`;
    }

    function quadrantBadge(q, label) {
        const cls = {
            'high_opp_high_real': 'bg-green-900/50 text-green-400 border-green-800',
            'high_opp_low_real': 'bg-yellow-900/50 text-yellow-400 border-yellow-800',
            'low_opp_high_real': 'bg-blue-900/50 text-blue-400 border-blue-800',
            'low_opp_low_real': 'bg-gray-800 text-gray-400 border-gray-700',
        };
        return `<span class="px-3 py-1.5 rounded-lg text-sm font-semibold border ${cls[q] || cls['low_opp_low_real']}">${label || q || '—'}</span>`;
    }

    const stageColors = { planned: 'bg-blue-900/40 text-blue-400', invested: 'bg-yellow-900/40 text-yellow-400', realized: 'bg-green-900/40 text-green-400' };
    const dimColors = { cost: 'border-green-600', revenue: 'border-purple-600', general: 'border-yellow-600', unclassified: 'border-gray-600' };
    const dimLabels = { cost: 'Cost-targeted Evidence', revenue: 'Revenue-targeted Evidence', general: 'General AI Evidence', unclassified: 'Other Evidence' };
    const dimIcons = { cost: '💰', revenue: '📈', general: '🤖', unclassified: '📋' };

    async function load() {
        try {
            const [data, peersData] = await Promise.all([
                fetch(`/api/companies/${TICKER}`).then(r => r.json()),
                fetch(`/api/companies/${TICKER}/peers`).then(r => r.json()),
            ]);

            if (data.error) {
                document.getElementById('loading').innerHTML = `<p class="text-red-400 text-lg">${TICKER} not found</p>`;
                return;
            }

            const s = data.scores || {};
            const fin = data.financials || {};
            const peers = peersData.peers || [];
            const evidence = data.evidence || {};

            const displayTicker = data.requested_ticker || data.ticker || data.slug || TICKER;
            document.getElementById('nav-title').textContent = `${displayTicker} — ${data.company_name || ''}`;
            document.title = `${displayTicker} — AI Opportunity Index`;

            let h = '';

            // ── Alias banner (secondary listing) ────────────────────────
            const isAlias = data.is_alias;
            const canonicalTicker = data.canonical_ticker || data.ticker;
            const requestedTicker = data.requested_ticker || TICKER;
            const childTickers = data.child_tickers || [];

            // ── Header ──────────────────────────────────────────────────
            let aliasHtml = '';
            if (isAlias) {
                aliasHtml = `<div class="flex items-center gap-2 mt-1.5">
                    <span class="text-xs px-2 py-0.5 rounded-md bg-sky-900/40 text-sky-400 border border-sky-800/50 font-semibold">Secondary Listing</span>
                    <span class="text-xs text-gray-500">Primary:</span>
                    <a href="/company/${canonicalTicker}?token=${AUTH_TOKEN}" class="text-xs px-2 py-0.5 rounded-md bg-gray-800 text-sky-400 border border-sky-800/50 hover:text-sky-300 hover:border-sky-700 transition-colors">${canonicalTicker}</a>
                </div>`;
            }
            const shareClassHtml = childTickers.length > 0
                ? `<div class="flex items-center gap-2 mt-1.5">
                    <span class="text-xs px-2 py-0.5 rounded-md bg-brand-900/40 text-brand-400 border border-brand-800/50 font-semibold">Primary Listing</span>
                    <span class="text-xs text-gray-500">Share classes:</span>
                    ${childTickers.map(t => `<a href="/company/${t}?token=${AUTH_TOKEN}" class="text-xs px-2 py-0.5 rounded-md bg-gray-800 text-gray-400 border border-gray-700 hover:text-brand-400 hover:border-brand-700 transition-colors">${t}</a>`).join(' ')}
                  </div>`
                : '';
            const displayTickerLabel = data.ticker || data.slug || TICKER || '';
            h += `<div class="mb-8">
                <div class="flex items-start justify-between flex-wrap gap-4">
                    <div>
                        <h1 class="text-3xl font-bold">${displayTickerLabel} <span class="text-gray-500 font-normal text-xl">— ${data.company_name || ''}</span></h1>
                        <p class="text-sm text-gray-400 mt-1">${[data.sector, data.industry, data.exchange].filter(Boolean).join(' · ')}</p>
                        ${aliasHtml}
                        ${shareClassHtml}
                    </div>
                    <div class="flex items-center gap-2 flex-wrap">
                        ${quadrantBadge(s.quadrant, s.quadrant_label)}
                        ${(s.flags && Array.isArray(s.flags) ? s.flags : []).map(f => {
                            const fKey = f.toLowerCase().replace(/[^a-z0-9]+/g, '_');
                            const flagColors = { 'low_evidence': 'bg-amber-900/40 text-amber-400 border-amber-800', 'stale_data': 'bg-orange-900/40 text-orange-400 border-orange-800', 'high_variance': 'bg-red-900/40 text-red-400 border-red-800', 'no_filings': 'bg-gray-800 text-gray-400 border-gray-700' };
                            return `<span class="text-xs px-2 py-0.5 rounded-full border ${flagColors[fKey] || 'bg-gray-800 text-gray-400 border-gray-700'}">${f}</span>`;
                        }).join('')}
                    </div>
                </div>
            </div>`;

            // ── Parent company banner (if this is a subsidiary) ──────────
            const parentCompanies = data.parent_companies || [];
            if (parentCompanies.length > 0) {
                h += `<div class="bg-sky-900/20 border border-sky-800/50 rounded-xl p-4 mb-6">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-xs px-2 py-0.5 rounded-md bg-sky-900/40 text-sky-400 border border-sky-800/50 font-semibold">Subsidiary</span>
                        <span class="text-sm text-gray-400">Owned by:</span>
                    </div>
                    <div class="flex flex-wrap gap-2 mt-2">
                        ${parentCompanies.map(p => {
                            const pLabel = p.ticker || p.slug;
                            const pctStr = p.ownership_pct != null ? ` (${(p.ownership_pct * 100).toFixed(0)}% owned)` : '';
                            return `<a href="/company/${pLabel}?token=${AUTH_TOKEN}" class="text-sm px-3 py-1.5 rounded-lg bg-gray-800 text-sky-400 border border-sky-800/50 hover:text-sky-300 hover:border-sky-700 transition-colors">${pLabel} — ${p.company_name || ''}${pctStr}</a>`;
                        }).join('')}
                    </div>
                </div>`;

                // If no scores and no evidence at all, show "not yet analyzed"
                const hasAnyEvidence = Object.keys(evidence).length > 0 && Object.values(evidence).some(arr => arr && arr.length > 0);
                const hasFinancials = Object.keys(fin).length > 0;
                if (s.opportunity == null && s.realization == null && !hasAnyEvidence && !hasFinancials) {
                    h += `<div class="bg-amber-900/20 border border-amber-800/50 rounded-xl p-6 mb-8 text-center">
                        <p class="text-amber-400 font-semibold mb-2">This subsidiary has not been analyzed yet.</p>
                        <p class="text-sm text-gray-400 mb-4">Run the pipeline stages below to collect data and generate scores for this company.</p>
                    </div>`;
                }
            }

            // ── Financials row ───────────────────────────────────────────
            const finItems = [
                { label: 'Market Cap', key: 'market_cap' },
                { label: 'Revenue', key: 'revenue' },
                { label: 'Net Income', key: 'net_income' },
                { label: 'Employees', key: 'employees' },
            ];
            h += '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">';
            for (const fi of finItems) {
                const obs = fin[fi.key];
                h += `<div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                    <div class="text-xs text-gray-500 uppercase tracking-wide">${fi.label}</div>
                    <div class="text-xl font-bold mt-1">${obs ? fmtMoney(obs.value, obs.value_units) : '—'}</div>
                    ${obs?.source_name && obs.source_name !== 'llm_discovery' ? `<div class="text-xs text-gray-600 mt-1">via ${obs.source_name}</div>` : ''}
                </div>`;
            }
            h += '</div>';

            // ── AI Opportunity Hero Card (Transparent Calculation) ─────
            {
                // Client-side fallback: compute opportunity_usd from financials if not stored
                const employees = fin.employees ? fin.employees.value : null;
                const revenue = fin.revenue ? fin.revenue.value : null;
                const costOppScore = s.cost_opp || 0;
                const fallbackCostOpp = (employees || 0) * 135000 * costOppScore * 0.15;
                const fallbackRevOpp = (revenue || 0) * 0.05;
                const costOppUsd = s.cost_opp_usd != null ? s.cost_opp_usd : fallbackCostOpp;
                const revOppUsd = s.revenue_opp_usd != null ? s.revenue_opp_usd : fallbackRevOpp;
                const oppUsd = s.opportunity_usd != null ? s.opportunity_usd : (costOppUsd + revOppUsd);
                const pCapture = s.capture_probability;
                const aiOpp = s.ai_index_usd != null ? s.ai_index_usd : (pCapture != null && oppUsd ? pCapture * oppUsd : null);
                const evidenceDollars = s.evidence_dollars;
                const rankStr = data.ai_index_rank != null ? `#${data.ai_index_rank} of ${data.ai_index_total}` : null;

                const fmtD = v => {
                    if (v == null) return '—';
                    if (v === 0) return '$0';
                    if (v >= 1e12) return '$' + (v / 1e12).toFixed(1) + 'T';
                    if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
                    if (v >= 1e6) return '$' + (v / 1e6).toFixed(0) + 'M';
                    if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';
                    return '$' + Math.round(v).toLocaleString();
                };

                h += `<div class="bg-gradient-to-r from-brand-900/40 to-gray-900 border border-brand-800/50 rounded-xl p-6 mb-8">
                    <div class="flex items-center justify-between flex-wrap gap-4 mb-4">
                        <div class="text-xs text-gray-500 uppercase tracking-wide font-semibold">AI Opportunity</div>
                        <div class="flex items-center gap-3">
                            ${rankStr ? `<span class="text-xs text-gray-500 font-mono">${rankStr}</span>` : ''}
                            ${quadrantBadge(s.quadrant, s.quadrant_label)}
                        </div>
                    </div>

                    <!-- Main equation: AI Opp = P(capture) x Opportunity -->
                    <div class="flex items-center gap-3 flex-wrap mb-4">
                        <div class="text-center">
                            <div class="text-3xl font-bold text-brand-400">${fmtD(aiOpp)}</div>
                            <div class="text-xs text-gray-500 mt-0.5">AI Opportunity</div>
                        </div>
                        <div class="text-2xl text-gray-600 font-light">=</div>
                        <div class="text-center">
                            <div class="text-2xl font-bold" style="color:${scoreColor(pCapture)}">${pCapture != null ? (pCapture * 100).toFixed(1) + '%' : '—'}</div>
                            <div class="text-xs text-gray-500 mt-0.5">P(capture)</div>
                        </div>
                        <div class="text-2xl text-gray-600 font-light">&times;</div>
                        <div class="text-center">
                            <div class="text-2xl font-bold text-gray-300">${fmtD(oppUsd)}</div>
                            <div class="text-xs text-gray-500 mt-0.5">Opportunity</div>
                        </div>
                    </div>

                    <!-- Opportunity breakdown -->
                    <div class="grid md:grid-cols-2 gap-4 mb-3">
                        <div class="bg-gray-800/40 rounded-lg p-3">
                            <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Cost Savings Opportunity</div>
                            <div class="text-lg font-bold text-green-400">${fmtD(costOppUsd)}</div>
                            <div class="text-xs text-gray-600 mt-1">${employees ? Math.round(employees).toLocaleString() + ' employees' : '—'} &times; $135K &times; ${(costOppScore * 100).toFixed(0)}% AI applicability &times; 15% productivity</div>
                        </div>
                        <div class="bg-gray-800/40 rounded-lg p-3">
                            <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Revenue Opportunity</div>
                            <div class="text-lg font-bold text-purple-400">${fmtD(revOppUsd)}</div>
                            <div class="text-xs text-gray-600 mt-1">5% of ${revenue ? fmtD(revenue) : '—'} revenue</div>
                        </div>
                    </div>

                    <!-- Evidence basis -->
                    <div id="hero-evidence-basis" class="text-xs text-gray-500 border-t border-gray-800/50 pt-2 mt-2">
                        ${evidenceDollars != null ? `Evidence basis: ${fmtD(evidenceDollars)} across valuations` : 'Evidence basis: loading...'}
                    </div>
                </div>`;
            }

            // ── Evidence Quality Summary (populated after valuations load) ──
            h += '<div id="evidence-quality-summary" class="mb-8"></div>';

            // ── Company Links (editable) ─────────────────────────────────
            h += '<div id="company-links-section" class="mb-8"></div>';

            // ── Pipeline Status Matrix ────────────────────────────────────
            h += '<div id="pipeline-status-section" class="mb-8"></div>';
            h += '<div id="rescore-indicator" class="mb-8"></div>';

            // ── Recent Pipeline Runs ─────────────────────────────────────
            h += '<div id="pipeline-runs-section" class="mb-8"></div>';

            // ── Evidence (Valuation Viewer + Enrichments) ────────────────
            // Scrollable container for all evidence content
            h += '<div id="evidence-container" class="mb-8"><h3 class="text-xl font-bold mb-4">Evidence</h3><div id="evidence-scroll-area" class="max-h-[800px] overflow-y-auto pr-1 space-y-4">';

            // Valuation viewer — lazy-loaded after DOM render
            h += '<div id="valuation-section"><div class="text-center py-8"><div class="loader mx-auto"></div><p class="mt-2 text-gray-500 text-xs">Loading valuations...</p></div></div>';

            // Legacy evidence fallback helpers
            function evidenceSummary(ev) {
                const p = ev.payload || {};
                const d = p.detail || {};
                const type = ev.evidence_type;
                const src = ev.source_name || 'Unknown source';
                const strength = ev.signal_strength || 'unknown';
                const contrib = ev.score_contribution != null ? ev.score_contribution.toFixed(3) : '?';

                if (type === 'filing_nlp') {
                    const reasoning = p.reasoning || '';
                    const excerpt = ev.source_excerpt || '';
                    const excerptSnip = excerpt.length > 150 ? excerpt.slice(0, 150) + '…' : excerpt;
                    const timesObserved = p.times_observed || p.filings_found_in;
                    const corroboration = timesObserved > 1 ? ` <span class="text-blue-400">(corroborated across ${timesObserved} filings)</span>` : '';
                    const dimLabel = ev.target_dimension === 'cost' ? 'cost reduction' : ev.target_dimension === 'revenue' ? 'revenue generation' : 'AI investment';
                    return `${strength === 'high' ? 'Strong' : strength === 'medium' ? 'Moderate' : 'Early'} evidence of <strong>${dimLabel}</strong> in SEC filings${corroboration} (${src}).${reasoning ? ' <em>' + reasoning + '</em>' : ''}${excerptSnip ? ' — <span class="text-gray-500">"' + excerptSnip + '"</span>' : ''} Contributing <strong>${contrib}</strong> to the score.`;
                }
                if (type === 'job') {
                    const ratio = p.estimated_ratio != null ? (p.estimated_ratio * 100).toFixed(1) + '%' : '?%';
                    const method = p.method || 'analysis';
                    return `An estimated <strong>${ratio} of job postings</strong> are AI/ML-related (via ${method} method from ${src}). This ${strength === 'high' ? 'high' : strength === 'medium' ? 'moderate' : 'low'} hiring signal indicates ${ev.capture_stage === 'invested' ? 'active investment' : ev.capture_stage === 'realized' ? 'realized deployment' : 'planned activity'} in AI talent, contributing <strong>${contrib}</strong> to the score.`;
                }
                if (type === 'cost_opportunity') {
                    const roles = d.workforce_roles || [];
                    const rolesSummary = roles.length > 0
                        ? roles.map(r => `<strong>${r.name}</strong> (${(r.ai_applicability * 100).toFixed(0)}% AI-applicable)`).join(', ')
                        : 'workforce roles';
                    const empNote = d.employee_count ? `, scaled for <strong>${d.employee_count.toLocaleString()} employees</strong>` : '';
                    return `This company's workforce includes ${rolesSummary}. Based on BLS occupational data${empNote}, <strong>${(p.cost_opportunity * 100).toFixed(1)}%</strong> of work is AI-automatable — contributing <strong>${contrib}</strong> to cost opportunity.`;
                }
                if (type === 'revenue_opportunity') {
                    const custs = d.customer_industries || [];
                    if (custs.length > 0) {
                        const custSummary = custs.map(c => `<strong>${c.industry}</strong> (${(c.avg_ai_applicability * 100).toFixed(0)}% AI-applicable)`).join(', ');
                        const boostNote = d.b2b_boost ? ` B2B boost applied (${d.b2b_boost}x).` : '';
                        return `This company serves customers in ${custSummary}. Their workforce AI applicability drives revenue opportunity.${boostNote} Score: <strong>${contrib}</strong>.`;
                    }
                    if (d.is_b2b) {
                        return `As a <strong>B2B ${d.sector || ''}</strong> company, customers have high AI applicability (${d.b2b_boost || 1.3}x boost). Revenue opportunity score: <strong>${contrib}</strong>.`;
                    }
                    const roles = d.workforce_roles || [];
                    if (roles.length > 0) {
                        const rolesSummary = roles.map(r => `<strong>${r.name}</strong>`).join(', ');
                        return `Revenue opportunity based on own workforce roles: ${rolesSummary}. Score: <strong>${contrib}</strong>.`;
                    }
                    return `Revenue opportunity score: <strong>${contrib}</strong> (${d.reason || src}).`;
                }
                if (type === 'patent') {
                    const count = p.count || p.patent_count || '?';
                    const timesObserved = p.times_observed || p.filings_found_in;
                    const corroboration = timesObserved > 1 ? ` <span class="text-blue-400">(observed in ${timesObserved} scoring runs)</span>` : '';
                    return `<strong>${count} AI-related patent${count !== 1 ? 's' : ''}</strong> found${corroboration} (${src}). Patent filings indicate ${ev.capture_stage === 'invested' ? 'active R&D investment' : 'IP activity'} with ${strength} signal strength, contributing <strong>${contrib}</strong>.`;
                }
                if (type === 'product') {
                    const reasoning = p.reasoning || '';
                    const excerpt = ev.source_excerpt || '';
                    const excerptSnip = excerpt.length > 150 ? excerpt.slice(0, 150) + '…' : excerpt;
                    const stageLabel = ev.capture_stage === 'realized' ? 'deployed and generating value' : ev.capture_stage === 'invested' ? 'in development or recently launched' : 'planned or announced';
                    const url = p.url ? ` <a href="${p.url}" target="_blank" rel="noopener" class="text-brand-500 hover:text-brand-400 underline">source</a>` : '';
                    return `AI product/news activity detected (${src})${url}. ${stageLabel.charAt(0).toUpperCase() + stageLabel.slice(1)}.${reasoning ? ' <em>' + reasoning + '</em>' : ''}${excerptSnip ? ' — <span class="text-gray-500">"' + excerptSnip + '"</span>' : ''} Signal: ${strength}, contributing <strong>${contrib}</strong>.`;
                }
                // Fallback for unknown types

    async function loadValuations(ticker) {
        const container = document.getElementById('valuation-section');
        if (!container) { console.error('valuation-section not found'); return; }

        try {
            console.log('[val] fetching...');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 10000);
            let resp;
            try {
                resp = await fetch(`/api/companies/${ticker}/valuations`, { signal: controller.signal });
            } finally {
                clearTimeout(timeout);
            }
            const vData = await resp.json();
            console.log('[val] got data, keys:', Object.keys(vData));

            if (vData.error || !vData.dimensions) {
                // Fallback to legacy evidence or "no data" message
                container.innerHTML = '';
                renderLegacyEvidence(container);
                return;
            }

            let vh = '';

            // 1. Pipeline Summary Bar
            const tc = vData.type_counts || {};
            const dimKeys = Object.keys(vData.dimensions);
            const vChildTickers = vData.child_tickers || [];
            const vIsAlias = vData.is_alias;
            const shareClassNote = vChildTickers.length > 0
                ? `<span class="text-xs text-gray-500 ml-2">(includes ${vChildTickers.join(', ')})</span>`
                : vIsAlias
                    ? `<span class="text-xs text-amber-400/70 ml-2">(canonical: ${vData.canonical_ticker})</span>`
                    : '';
            vh += `<div class="bg-gray-900 border border-gray-800 rounded-xl p-4 mb-4">
                <div class="flex items-center justify-between flex-wrap gap-3">
                    <div class="flex items-center gap-2 text-sm">
                        <span class="font-semibold text-gray-200">Evidence Valuations</span>
                        ${shareClassNote}
                        <span class="text-gray-500">|</span>
                        <span class="text-gray-400">${vData.total_passages} passages</span>
                        <span class="text-gray-600">&rarr;</span>
                        <span class="text-gray-400">${vData.total_groups} groups</span>
                        <span class="text-gray-600">&rarr;</span>
                        <span class="text-gray-400">${dimKeys.length} dimensions</span>
                    </div>
                    <div class="flex items-center gap-2 text-xs">
                        ${tc.plan ? `<span class="px-2 py-0.5 rounded border ${typeBadgeColors.plan}">${tc.plan} plan</span>` : ''}
                        ${tc.investment ? `<span class="px-2 py-0.5 rounded border ${typeBadgeColors.investment}">${tc.investment} investment</span>` : ''}
                        ${tc.capture ? `<span class="px-2 py-0.5 rounded border ${typeBadgeColors.capture}">${tc.capture} capture</span>` : ''}
                    </div>
                </div>
            </div>`;

            // 2. Flatten all groups into one list with metadata
            const allGroups = [];
            const dimKeys2 = Object.keys(vData.dimensions);
            for (const dim of dimKeys2) {
                const dd = vData.dimensions[dim];
                for (const g of (dd.groups || [])) {
                    allGroups.push({ ...g, _dim: dim, _dimData: dd });
                }
            }

            // Collect unique filter values
            const allSources = new Set();
            const allDims = new Set();
            const allEvTypes = new Set();
            const allCaptureStages = new Set();
            for (const g of allGroups) {
                allDims.add(g._dim);
                (g.source_types || []).forEach(s => allSources.add(s));
                if (g.valuation?.evidence_type) allEvTypes.add(g.valuation.evidence_type);
                // Collect capture stages from passages as fallback
                for (const p of (g.passages || [])) {
                    if (p.capture_stage) allCaptureStages.add(p.capture_stage);
                }
                // Also check group-level evidence_type
                if (g.evidence_type) allEvTypes.add(g.evidence_type);
            }

            // Store data globally for filtering
            window._evidenceGroups = allGroups;
            window._evidenceFilters = { source: null, dimension: null, evType: null, captureStage: null, sort: 'date_newest' };

            const dimBadgeColors = { cost: 'bg-green-900/30 text-green-400 border-green-800', revenue: 'bg-purple-900/30 text-purple-400 border-purple-800', general: 'bg-yellow-900/30 text-yellow-400 border-yellow-800' };
            const srcBadgeColors = { filing: 'bg-sky-900/30 text-sky-400 border-sky-800', news: 'bg-orange-900/30 text-orange-400 border-orange-800', github: 'bg-gray-700/50 text-gray-300 border-gray-600', careers: 'bg-pink-900/30 text-pink-400 border-pink-800', ir: 'bg-teal-900/30 text-teal-400 border-teal-800', blog: 'bg-indigo-900/30 text-indigo-400 border-indigo-800' };

            // Filter bar

                    // Source passages (collapsible)
                    if (g.passages && g.passages.length > 0) {

                                    ${p.source_authority ? `<span class="px-1.5 py-0.5 rounded ${

                                    ${p.source_date ? `<span><span class="text-gray-500">published:</span> ${p.source_date}</span>` : ''}

    function renderEvidenceQuality(vData) {
        const container = document.getElementById('evidence-quality-summary');
        if (!container || !vData || !vData.dimensions) return;

        const dims = vData.dimensions;
        const dimKeys = Object.keys(dims);
        if (dimKeys.length === 0) return;

        // Aggregate stats across all groups
        let totalSpec = 0, totalRec = 0, groupCount = 0;
        for (const dim of dimKeys) {
            const dd = dims[dim];
            for (const g of (dd.groups || [])) {
                if (g.valuation) {
                    totalSpec += g.valuation.specificity || 0;
                    totalRec += g.valuation.recency || 0;
                    groupCount++;
                }
            }
        }
        const avgSpec = groupCount > 0 ? totalSpec / groupCount : 0;
        const avgRec = groupCount > 0 ? totalRec / groupCount : 0;

        const tc = vData.type_counts || {};

        // Mini bar helper
        const miniBar = (label, value) => {
            const pct = Math.min(value * 100, 100);
            const color = value >= 0.5 ? '#22c55e' : value >= 0.3 ? '#eab308' : '#ef4444';
            return `<div class="flex items-center gap-2">
                <span class="text-xs text-gray-500 w-24 flex-shrink-0">${label}</span>
                <div class="flex-1 h-2 bg-gray-800 rounded overflow-hidden"><div class="h-full rounded" style="width:${pct}%;background:${color}"></div></div>
                <span class="text-xs font-mono w-10 text-right" style="color:${color}">${value.toFixed(2)}</span>
            </div>`;
        };

        let qh = `<div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h3 class="font-semibold mb-4 text-gray-300">Evidence Quality Summary</h3>

            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-2 font-semibold">Pipeline</div>
                    <div class="flex items-center gap-2 text-sm text-gray-300 mb-3">
                        <span class="font-mono text-gray-200">${vData.total_passages}</span> passages
                        <span class="text-gray-600">&rarr;</span>
                        <span class="font-mono text-gray-200">${vData.total_groups}</span> groups
                        <span class="text-gray-600">&rarr;</span>
                        <span class="font-mono text-gray-200">${dimKeys.length}</span> dimensions
                    </div>

                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-2 font-semibold">Stage Breakdown</div>
                    <div class="flex items-center gap-2 mb-4">
                        ${tc.plan ? `<span class="text-xs px-2 py-0.5 rounded border bg-blue-900/50 text-blue-400 border-blue-800">${tc.plan} plan</span>` : ''}
                        ${tc.investment ? `<span class="text-xs px-2 py-0.5 rounded border bg-amber-900/50 text-amber-400 border-amber-800">${tc.investment} investment</span>` : ''}
                        ${tc.capture ? `<span class="text-xs px-2 py-0.5 rounded border bg-green-900/50 text-green-400 border-green-800">${tc.capture} capture</span>` : ''}
                        ${!tc.plan && !tc.investment && !tc.capture ? '<span class="text-xs text-gray-600">No stage data</span>' : ''}
                    </div>

                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-2 font-semibold">Quality Indicators</div>
                    <div class="space-y-2">
                        ${miniBar('Avg Specificity', avgSpec)}
                        ${miniBar('Avg Recency', avgRec)}
                    </div>
                </div>

                <div>
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-2 font-semibold">Per-Dimension Breakdown</div>
                    <table class="w-full text-xs">
                        <thead><tr class="border-b border-gray-800">
                            <th class="text-left py-1.5 text-gray-500 font-medium">Dimension</th>
                            <th class="text-right py-1.5 text-gray-500 font-medium">Groups</th>
                            <th class="text-right py-1.5 text-gray-500 font-medium">Stage Mix</th>
                            <th class="text-right py-1.5 text-gray-500 font-medium">$ Evidence</th>
                        </tr></thead>
                        <tbody>`;

        const dimDisplayColors = { cost: 'text-green-400', revenue: 'text-purple-400', general: 'text-yellow-400' };
        let totalEvidenceDollars = 0;
        for (const dim of dimKeys) {
            const dd = dims[dim];
            const gc = dd.group_count || (dd.groups || []).length;
            const dollarEst = dd.potential_usd != null ? fmtMoney(dd.potential_usd) : (dd.actual_usd != null ? fmtMoney(dd.actual_usd) : '—');
            totalEvidenceDollars += dd.potential_usd || dd.actual_usd || 0;
            // Stage mix: count plan/invest/capture groups
            const stageMap = {};
            for (const g of (dd.groups || [])) {
                const et = g.evidence_type || g.valuation?.evidence_type || '?';
                stageMap[et] = (stageMap[et] || 0) + 1;
            }
            const stageParts = [];
            if (stageMap.plan) stageParts.push(`${stageMap.plan}P`);
            if (stageMap.investment) stageParts.push(`${stageMap.investment}I`);
            if (stageMap.capture) stageParts.push(`${stageMap.capture}C`);
            const stageMix = stageParts.length > 0 ? stageParts.join('/') : '—';
            const dimColor = dimDisplayColors[dim] || 'text-gray-400';
            qh += `<tr class="border-b border-gray-800/50">
                <td class="py-1.5 ${dimColor} font-medium capitalize">${dim}</td>
                <td class="py-1.5 text-right font-mono text-gray-300">${gc}</td>
                <td class="py-1.5 text-right font-mono text-gray-400">${stageMix}</td>
                <td class="py-1.5 text-right font-mono text-amber-400">${dollarEst}</td>
            </tr>`;
        }

        qh += `</tbody></table>
                </div>
            </div>
        </div>`;

        container.innerHTML = qh;

        // Enrich hero card evidence basis line with per-stage dollar breakdowns
        const heroBasis = document.getElementById('hero-evidence-basis');
        if (heroBasis && totalEvidenceDollars > 0) {
            const fmtD2 = v => {
                if (v == null || v === 0) return '$0';
                if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
                if (v >= 1e6) return '$' + (v / 1e6).toFixed(0) + 'M';
                if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';
                return '$' + Math.round(v).toLocaleString();
            };
            const parts = [];
            if (tc.plan) parts.push(`plan: ${fmtD2(vData.plan_dollars || 0)} (${tc.plan})`);
            if (tc.investment) parts.push(`invest: ${fmtD2(vData.investment_dollars || 0)} (${tc.investment})`);
            if (tc.capture) parts.push(`capture: ${fmtD2(vData.capture_dollars || 0)} (${tc.capture})`);
            heroBasis.innerHTML = `Evidence basis: ${fmtD2(totalEvidenceDollars)} across ${vData.total_groups} groups &mdash; ${parts.join(' | ')}`;
        }
    }

    function renderLegacyEvidence(container) {
        const evidence = window._legacyEvidence || {};
        const evTypes = Object.keys(evidence);
        if (evTypes.length === 0) {
            container.insertAdjacentHTML('beforeend', '<div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-8 text-center text-gray-500">No evidence items yet. Run scoring with more data sources to populate.</div>');
            return;
        }

        const allEvidence = [];
        evTypes.forEach(type => {
            (evidence[type] || []).forEach(ev => {
                allEvidence.push({ ...ev, evidence_type: type });
            });
        });
        allEvidence.sort((a, b) => (b.score_contribution || 0) - (a.score_contribution || 0));

        let h = '<div class="mb-8"><h3 class="text-xl font-bold mb-4">Evidence (Legacy)</h3>';
        h += '<div class="space-y-2">';
        for (const ev of allEvidence.slice(0, 30)) {
            const dim = ev.target_dimension || 'general';
            const stageClass = stageColors[ev.capture_stage] || 'bg-gray-800 text-gray-400';
            const srcTickerBadge = ev.source_ticker && ev.source_ticker !== data.ticker
                ? `<span class="text-xs px-1.5 py-0.5 rounded bg-amber-900/40 text-amber-400 border border-amber-800" title="Evidence from secondary listing ${ev.source_ticker}">via ${ev.source_ticker}</span>`
                : '';
            h += `<div class="bg-gray-900 border-l-4 ${dimColors[dim] || 'border-gray-600'} rounded-r-lg p-4">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                    <span class="text-sm font-medium text-gray-200">${ev.evidence_type}${ev.subtype && ev.subtype !== ev.evidence_type ? ' / ' + ev.subtype : ''}</span>
                    ${ev.capture_stage ? `<span class="text-xs px-2 py-0.5 rounded ${stageClass}">${ev.capture_stage}</span>` : ''}
                    ${srcTickerBadge}
                    ${ev.score_contribution != null ? `<span class="ml-auto font-mono text-xs" style="color:${scoreColor(ev.score_contribution)}">${ev.score_contribution.toFixed(3)}</span>` : ''}
                </div>
                <div class="text-xs text-gray-400">
                    ${ev.source_name || '—'}
                    ${ev.source_publisher ? ` <span class="text-gray-500">via</span> ${ev.source_publisher}` : ''}
                    ${ev.source_authority ? ` <span class="px-1 py-0.5 rounded text-[10px] ${
                        ev.source_authority === 'first_party_disclosure' ? 'bg-emerald-900/40 text-emerald-500' :
                        ev.source_authority === 'first_party_public' ? 'bg-blue-900/40 text-blue-500' :
                        'bg-gray-800 text-gray-500'
                    }">${ev.source_authority.replace(/_/g, ' ')}</span>` : ''}
                    ${ev.source_excerpt ? '— "' + (ev.source_excerpt.length > 150 ? ev.source_excerpt.slice(0, 150) + '...' : ev.source_excerpt) + '"' : ''}
                </div>
            </div>`;
        }
        if (allEvidence.length > 30) {
            h += `<p class="text-xs text-gray-500 pl-4">...and ${allEvidence.length - 30} more items</p>`;
        }
        h += '</div></div>';
        container.insertAdjacentHTML('beforeend', h);
    }

    function editField(key) {
        const record = window._companyRecord;
        const def = _companyFieldDefs.find(d => d.key === key);
        if (!def || def.readonly) return;

        const displayEl = document.getElementById(`field-display-${key}`);
        const rowEl = document.getElementById(`field-row-${key}`);
        if (!displayEl) return;

        const currentVal = record[key] || '';

        // Replace the display + edit button with an inline input + save/cancel
        const inputType = def.type === 'url' ? 'url' : 'text';
        const placeholder = def.type === 'url' ? 'https://...' : def.label;

        // Hide the edit button
        const editBtn = rowEl.querySelector('button');
        if (editBtn) editBtn.style.display = 'none';

        displayEl.innerHTML = `<div class="flex items-center gap-2">
            <input type="${inputType}" id="field-input-${key}" value="${currentVal.replace(/"/g, '&quot;')}"
                placeholder="${placeholder}"
                class="flex-1 bg-gray-800 border border-gray-700 rounded px-2.5 py-1 text-sm text-gray-200 placeholder-gray-600 focus:border-brand-600 focus:outline-none transition-colors"
                onkeydown="if(event.key==='Enter')saveField('${key}');if(event.key==='Escape')cancelField('${key}')">
            <button onclick="saveField('${key}')" class="text-xs px-2 py-1 rounded bg-brand-600 text-white hover:bg-brand-700 transition-colors">Save</button>
            <button onclick="cancelField('${key}')" class="text-xs px-2 py-1 rounded border border-gray-700 text-gray-400 hover:text-gray-200 transition-colors">Cancel</button>
        </div>`;

        // Focus the input
        const input = document.getElementById(`field-input-${key}`);
        if (input) { input.focus(); input.select(); }
    }

    function cancelField(key) {
        const container = document.getElementById('company-links-section');
        renderCompanyInfo(container, window._companyRecord);
    }

    async function saveField(key) {
        const input = document.getElementById(`field-input-${key}`);
        if (!input) return;

        const newVal = input.value.trim();
        const oldVal = window._companyRecord[key] || '';
        if (newVal === oldVal) { cancelField(key); return; }

        const payload = {};
        payload[key] = newVal || null;

        // Show saving state
        input.disabled = true;
        const saveBtn = input.parentElement.querySelector('button');
        if (saveBtn) saveBtn.textContent = '...';

        try {
            const resp = await fetch(`/api/companies/${TICKER}/links`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const record = await resp.json();
            if (record.error) {
                alert('Error: ' + record.error);
                input.disabled = false;
                if (saveBtn) saveBtn.textContent = 'Save';
                return;
            }

            window._companyRecord = record;
            const container = document.getElementById('company-links-section');
            renderCompanyInfo(container, record);

            // Refresh pipeline status since links may affect stages
            loadPipelineStatus(TICKER);
        } catch (e) {
            console.error('Failed to save field:', e);
            alert('Failed to save: ' + e.message);
            input.disabled = false;
            if (saveBtn) saveBtn.textContent = 'Save';
        }
    }

            };

            const stageTooltips = {
                discover_links: 'Finds the company\'s GitHub org, careers page, investor relations page, and blog. These URLs feed subsequent collection stages.',
                collect_news: 'Searches for recent AI-related news, product launches, and press releases about the company over the last 6 months.',
                collect_github: 'Retrieves the company\'s public GitHub activity: total repos, AI/ML repos, star counts, top repositories, and languages used.',

                extract_filings: 'Analyzes SEC 10-K and 10-Q filings to identify AI-related passages, classifying each by cost/revenue target and plan/invest/capture stage with confidence scores.',
                extract_news: 'Extracts AI-related evidence from news articles, classifying by dimension and capture stage.',

                score: 'Aggregates all evidence into company-level scores: cost/revenue opportunity (from BLS workforce data), cost/revenue capture (from evidence), ROI metrics, quadrant assignment, and the AI Index expected-value calculation.',
            };

            const doneCount = stageOrder.filter(k => stages[k]?.done).length;
            const emptyCount = stageOrder.filter(k => stages[k]?.checked_empty).length;
            const totalCount = stageOrder.length;

            let ph = `<div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-semibold text-gray-300">Pipeline Status</h3>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-500">${doneCount}/${totalCount} stages complete</span>
                        <button id="run-whole-pipeline-btn" onclick="showRunMenu(this, (force) => runWholePipeline(force))" class="px-3 py-1.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-xs font-semibold transition-colors">Run Whole Pipeline</button>

                </div>
                <div class="w-full bg-gray-800 rounded-full h-2 mb-5">
                    <div class="h-2 rounded-full transition-all" style="width:${(doneCount/totalCount*100).toFixed(0)}%;background:${doneCount === totalCount ? '#22c55e' : '#6366f1'}"></div>
                </div>
                <div class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-9 gap-3">`;

            for (const key of stageOrder) {
                const st = stages[key];
                if (!st) continue;
                const done = st.done;
                const checkedEmpty = st.checked_empty;
                const stale = st.stale;
                const icon = stageIcons[key] || '';
                const tooltip = stageTooltips[key] || '';
                const countLabel = st.count != null && st.count > 0 ? st.count : '';
                const dateLabel = st.last_run ? new Date(st.last_run).toLocaleDateString() : '';

                // Four states: done (green), stale/needs re-run (red/orange), checked empty (amber), not run (gray)
                let borderColor, bgColor, iconColor, textColor, statusLabel;
                if (stale) {
                    borderColor = 'border-red-800/60'; bgColor = 'bg-red-900/10';
                    iconColor = 'text-red-400/70'; textColor = 'text-gray-400';
                    statusLabel = `<div class="text-xs text-red-400/80 mt-0.5">stale</div>`;
                } else if (done && !checkedEmpty) {
                    borderColor = 'border-green-800'; bgColor = 'bg-green-900/20';
                    iconColor = 'text-green-400'; textColor = 'text-gray-300';
                    statusLabel = '';
                } else if (checkedEmpty) {
                    borderColor = 'border-amber-800/50'; bgColor = 'bg-amber-900/10';
                    iconColor = 'text-amber-500/60'; textColor = 'text-gray-400';
                    statusLabel = `<div class="text-xs text-amber-500/70 mt-0.5">no data</div>`;
                } else {
                    borderColor = 'border-gray-700'; bgColor = 'bg-gray-800/30';
                    iconColor = 'text-gray-600'; textColor = 'text-gray-500';
                    statusLabel = '';

                // Build detail line for discover_links
                let detailHtml = '';
                if (key === 'discover_links' && st.detail) {
                    const linkNames = { github_url: 'GitHub', careers_url: 'Careers', ir_url: 'IR', blog_url: 'Blog' };
                    const found = Object.entries(st.detail).filter(([,v]) => v).map(([k]) => linkNames[k] || k);
                    const missing = Object.entries(st.detail).filter(([,v]) => !v).map(([k]) => linkNames[k] || k);
                    detailHtml = '';
                    if (found.length > 0) detailHtml += `<div class="text-xs text-green-600 mt-1 leading-tight">${found.join(', ')}</div>`;
                    if (missing.length > 0) detailHtml += `<div class="text-xs text-gray-600 mt-0.5 leading-tight line-through">${missing.join(', ')}</div>`;
                }

                // Summary for checked-empty stages
                if (st.summary) {
                    detailHtml += `<div class="text-xs text-amber-600/70 mt-0.5 leading-tight">${st.summary}</div>`;
                }

                // Unscored evidence badge for score stage
                if (key === 'score' && st.unscored_evidence > 0) {
                    detailHtml += `<div class="text-xs text-amber-400 font-medium mt-0.5">${st.unscored_evidence} unscored</div>`;
