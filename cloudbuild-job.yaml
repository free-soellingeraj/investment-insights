steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-opportunity-scoring-job', '-f', 'Dockerfile', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-opportunity-scoring-job']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'ai-opportunity-scoring'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-opportunity-scoring-job'
      - '--region'
      - 'us-central1'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,FIRECRAWL_API_KEY=firecrawl-api-key:latest,GITHUB_TOKEN=github-token:latest'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--task-timeout'
      - '3600'
      - '--command'
      - 'python'
      - '--args'
      - 'scripts/score_companies.py'

images:
  - 'gcr.io/$PROJECT_ID/ai-opportunity-scoring-job'
